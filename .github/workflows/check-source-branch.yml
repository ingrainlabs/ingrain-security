name: check-source-branch

# Enforces that pull requests into the default branch originate only from the
# 'development' branch. The companion ruleset (also named check-source-branch)
# requires this job's status check to pass, so a PR from any other source branch
# is blocked from merging. Gating happens here because GitHub rulesets cannot
# inspect a PR's source branch on their own.

on:
  pull_request:
    # 'edited' catches a PR being retargeted onto main after it was opened.
    types: [opened, reopened, synchronize, edited]
    branches: [main]

permissions:
  contents: read

jobs:
  # The job name is the status-check name the ruleset requires — keep them identical.
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR source branch is development
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$HEAD_REF" != "development" ]; then
            echo "::error::PRs into main must come from the 'development' branch (got '${HEAD_REF}')."
            exit 1
          fi
          echo "Source branch '${HEAD_REF}' is allowed."
