name: ci

# Runs the offline test tier — the tests that need no `claude` CLI, no auth and no
# model calls — plus lint and format checks:
#
#   ShellCheck · lint · fmt:check · tests/static · tests/hooks
#
# ShellCheck runs as its own step below, so a bad shell script fails on its own line in
# the log rather than inside a Deno test run. The Deno step therefore calls
# `deno task ci:no-shell` (lint · fmt:check · tests/static · tests/hooks) — from the
# tests/ directory, where deno.json lives — rather than the umbrella `deno task ci`,
# which also runs tests/shell and would lint the same scripts a second time. Locally,
# `deno task ci` remains the one command that covers everything offline.
#
# ShellCheck is installed at a pinned version rather than inherited from the runner
# image: the preinstalled copy is an unguarded implementation detail that could vanish,
# or move to a release whose new checks turn an unrelated PR red. Pinning keeps the lint
# reproducible, and matches how setup-deno is pinned by SHA.
#
# The agent tiers (`deno task test:agent`, `deno task test:integration`) drive the
# real `claude` CLI: they need credentials, cost model calls and can flake on live
# output, so they are deliberately not run here. Run them locally before opening a
# PR.

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # The job name is the status-check name a ruleset would require — keep them identical.
  test-offline:
    runs-on: ubuntu-latest
    defaults:
      run:
        # deno.json lives in tests/, and every task assumes that working directory.
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Install ShellCheck
        env:
          SHELLCHECK_VERSION: v0.11.0
          # The release asset's sha256, from the GitHub releases API. A tag alone pins
          # only the name, not the bytes behind it — bump both together on an upgrade.
          SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
        # Runs in the runner's temp dir, not the job's `tests` working directory, so the
        # download and its unpacked contents can't litter the checkout. /usr/local/bin
        # precedes /usr/bin on the runner, so this shadows the image's preinstalled copy;
        # the closing --version proves which binary won and records it in the log.
        working-directory: ${{ runner.temp }}
        # Downloads to a file rather than piping into tar: the default step shell is
        # `bash -e`, without `pipefail`, so a failed curl in a pipeline would be masked by
        # tar's exit code and ship a truncated binary.
        run: |
          archive="shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSLo "$archive" "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/${archive}"
          echo "${SHELLCHECK_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xJf "$archive"
          sudo install -m 0755 "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: ShellCheck
        # Discovery mirrors tests/shell/shellcheck.test.ts, the local tier: every file tracked
        # by git that is a `*.sh` (the sourced libs, which have no shebang) or declares a
        # bash/sh shebang (the hooks, which are deliberately extensionless — see
        # hooks/run-hook.cmd for why). A `*.sh` glob alone would miss every hook.
        #
        # Runs from the repo root, not the job's `tests` working directory, so the repo-root
        # .shellcheckrc applies — its `source-path=SCRIPTDIR` is what lets ShellCheck follow the
        # `# shellcheck source=...` directives the hooks use to pull in their shared libs.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          scripts=()
          while IFS= read -r -d '' path; do
            # `git ls-files` lists staged-but-deleted paths; mid-rename those would otherwise
            # reach ShellCheck as a "does not exist" fatal.
            [ -f "$path" ] || continue
            case "$path" in
              hooks/run-hook.cmd) continue ;;              # bat/bash polyglot, not lintable bash
              *.sh) scripts+=("$path"); continue ;;
            esac
            # An `&&` chain here would end the loop body on a non-match, and `set -e` would
            # take that as the loop failing.
            if head -n 1 -- "$path" | grep -qE '^#!.*\b(bash|sh)\b'; then
              scripts+=("$path")
            fi
          done < <(git ls-files -z)

          # A discovery bug must fail loudly rather than lint nothing and report green.
          if [ "${#scripts[@]}" -lt 4 ]; then
            echo "discovered only ${#scripts[@]} shell scripts — discovery has regressed" >&2
            exit 1
          fi

          printf 'linting %s scripts:\n' "${#scripts[@]}"
          printf '  %s\n' "${scripts[@]}"
          shellcheck "${scripts[@]}"

      - name: Lint, format check and offline tests
        # Shell is linted by the step above, so this skips tests/shell.
        run: deno task ci:no-shell
