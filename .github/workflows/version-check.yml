name: version-check

# Fails if the plugin version has drifted across the three config files
# (.claude-plugin/plugin.json, .claude-plugin/marketplace.json,
# .codex-plugin/plugin.json). Mirrors the local pre-commit guard.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify plugin version is in sync
        run: .github/release.sh --check
